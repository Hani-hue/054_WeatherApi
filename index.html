<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pencarian Lokasi (Geocoding)</title>
    <style>
        /* Mengatur font dan background halaman */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Desain kotak utama (Card) */
        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 450px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.08);
        }

        h2 {
            margin-top: 0;
            text-align: center;
            color: #2c3e50;
            font-size: 24px;
        }

        /* Mengatur susunan kotak input dan tombol */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ccd1d9;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: #3498db;
        }

        button {
            padding: 12px 20px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #2980b9;
        }

        /* Desain area hasil */
        .result-box {
            background-color: #f9fbfd;
            border: 1px solid #e1e8ed;
            border-radius: 8px;
            padding: 15px 20px;
        }

        .result-item {
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e1e8ed;
        }

        .result-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .label {
            font-size: 12px;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            display: block;
        }

        .value {
            font-size: 16px;
            font-weight: 600;
            color: #2c3e50;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Cari Lokasi 🌍</h2>
        
        <div class="input-group">
            <input type="text" id="inputKota" placeholder="Contoh: Jakarta, Bandung...">
            <button id="btnCari">Cari</button>
        </div>

        <div class="result-box">
            <div class="result-item">
                <span class="label">Hasil</span>
                <p class="value" id="hasil">-</p>
            </div>
            <div class="result-item">
                <span class="label">Kota</span>
                <p class="value" id="kota">-</p>
            </div>
            <div class="result-item">
                <span class="label">Tipe Lokasi</span>
                <p class="value" id="tipe">-</p>
            </div>
            <div class="result-item">
                <span class="label">Koordinat</span>
                <p class="value" id="koordinat">-</p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <script>
        $('#btnCari').click(function() {
            const kota = $('#inputKota').val(); 

            if (kota === "") {
                alert("Tolong masukkan nama kota terlebih dahulu!");
                return; 
            }

            // GANTI KEY DI BAWAH INI DENGAN API KEY-MU YANG BARU
            const urlapi = "https://api.maptiler.com/geocoding/" + kota + ".json?key=rDnjFjoguIDWTBe5iGTL";

            // Ubah teks tombol jadi 'Mencari...' saat loading
            const btn = $(this);
            btn.text('Mencari...').prop('disabled', true);

            $.ajax({
                url : urlapi,
                method : "GET",
                success : function(data){
    btn.text('Cari').prop('disabled', false); 
    
    if (data.features && data.features.length > 0) {
        const h = document.getElementById("hasil");
        const k = document.getElementById("kota");
        const t = document.getElementById("tipe");
        const ko = document.getElementById("koordinat");

        // 1. Hasil / Lokasi (place_name_id)
        // Kita pakai fallback || data.features[0].place_name buat jaga-jaga kalau place_name_id tidak ditemukan di JSON-nya
        let lokasi = data.features[0].place_name_id || data.features[0].place_name || "-";
        
        // 2. Negara / Kota (matching_text)
        let negara = data.features[0].matching_text || "-";
        
        // 3. Tipe Lokasi (place_type_name)
        let tipe = "-";
        if (data.features[0].place_type_name && data.features[0].place_type_name.length > 0) {
            tipe = data.features[0].place_type_name.join(", "); 
        }
        
        // 4. Koordinat (coordinates)
        let koordinat = data.features[0].geometry.coordinates;

        // Tampilkan ke HTML
        h.innerHTML = lokasi;
        k.innerHTML = negara;
        t.innerHTML = tipe;
        ko.innerHTML = koordinat.join(", "); 
    } else {
        alert("Lokasi tidak ditemukan! Coba kata kunci lain.");
    }
},
                error : function(error){
                    btn.text('Cari').prop('disabled', false);
                    console.log(error);
                    alert("Terjadi kesalahan! Cek kembali koneksi atau API Key kamu.");
                }
            });
        });
    </script>
</body>
</html>
